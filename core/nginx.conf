# VPN-Starter-Kit :: core/nginx.conf
# Single front door. Multiplexes three public ports:
#   80, 8080  -> plain HTTP WebSocket
#   443       -> TLS (wss) + gRPC (needs http2, TLS-only — no plaintext grpc port)
# Routing (same on every port):
#   /vless -> Xray 10001 | /vmess -> Xray 10002 | everything else -> ws.py 8880 (SSH-WS)
#   443 only, additionally:
#     /vmess-grpc -> Xray 10003, /vless-grpc -> Xray 10004 (gRPC)
#     /trojan -> Xray 10005 (ws), /trojan-grpc -> Xray 10006 (gRPC)
#     Trojan is TLS-only by design (its whole point is looking like HTTPS —
#     a plaintext Trojan isn't really Trojan), so it has no 80/8080 route.
# WireGuard runs entirely outside nginx — it's a separate UDP service
# (core/wireguard.sh), not an Xray inbound.
# Deployed to /etc/nginx/conf.d/vpn.conf by the installer.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --------- PLAIN: ports 80 + 8080 ---------
server {
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name _;

    location /vless {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /vmess {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSH-over-WebSocket: any other path (clients typically use "/")
    # 60s, not 300s like the Xray routes: this is what makes a silently-
    # dead connection (phone dropped without closing cleanly) get torn
    # down within about a minute instead of lingering for 5, so the
    # SSH menu's "Check Active Users" count reflects reality promptly.
    # Well-behaved tunnel apps ping periodically specifically to survive
    # this; a client with zero traffic at all for 60s gets disconnected.
    location / {
        proxy_pass http://127.0.0.1:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# --------- TLS: port 443 ---------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # Stable cert path — tls.sh puts either a Let's Encrypt or a self-signed
    # cert here, so nginx always has something to load.
    ssl_certificate     /etc/vpn-script/tls/fullchain.pem;
    ssl_certificate_key /etc/vpn-script/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Latency tuning: session resumption skips the full handshake on
    # reconnects (abbreviated 1-RTT resume instead of a fresh one), and a
    # smaller buffer gets the first TLS record out sooner instead of
    # waiting to fill nginx's 16k default — lower time-to-first-byte at a
    # negligible throughput cost, the right trade for an interactive
    # tunnel rather than bulk file serving.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;
    ssl_buffer_size     4k;

    location /vless {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /vmess {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /vmess-grpc {
        if ($content_type !~ "application/grpc") {
            return 404;
        }
        client_max_body_size 0;
        client_body_buffer_size 512k;
        grpc_read_timeout 1100s;
        grpc_send_timeout 1100s;
        grpc_pass grpc://127.0.0.1:10003;
    }

    location /vless-grpc {
        if ($content_type !~ "application/grpc") {
            return 404;
        }
        client_max_body_size 0;
        client_body_buffer_size 512k;
        grpc_read_timeout 1100s;
        grpc_send_timeout 1100s;
        grpc_pass grpc://127.0.0.1:10004;
    }

    location /trojan {
        proxy_pass http://127.0.0.1:10005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /trojan-grpc {
        if ($content_type !~ "application/grpc") {
            return 404;
        }
        client_max_body_size 0;
        client_body_buffer_size 512k;
        grpc_read_timeout 1100s;
        grpc_send_timeout 1100s;
        grpc_pass grpc://127.0.0.1:10006;
    }

    # SSH-over-WebSocket: 60s, not 300s, for the same reason as the plain
    # (80/8080) SSH-WS route above — see that block's comment.
    location / {
        proxy_pass http://127.0.0.1:8880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
